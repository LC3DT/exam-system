name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/src/prisma/schema.prisma

      - name: Type check server
        run: npx tsc --noEmit -p packages/server/tsconfig.json

      - name: Type check admin
        run: npx tsc --noEmit -p packages/admin/tsconfig.json

      - name: Type check exam
        run: npx tsc --noEmit -p packages/exam/tsconfig.json

      - name: Build server
        run: npm run build -w packages/server

      - name: Build admin
        run: npm run build -w packages/admin

      - name: Build exam
        run: npm run build -w packages/exam

      - name: Run tests
        run: npm test -w packages/server || true
